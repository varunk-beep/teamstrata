<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Strata — SPV Command Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;
  --surface:#0e1117;
  --border:#1e2433;
  --accent:#2563eb;
  --accent2:#0ea5e9;
  --text:#e8eaf0;
  --muted:#6b7280;
  --card:#111827;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow:hidden;
}

/* ── LANDING ── */
#landing{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);
  transition:opacity .5s ease,transform .5s ease;
}
#landing.hide{
  opacity:0;transform:translateY(-20px);pointer-events:none;
}

.grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(37,99,235,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(37,99,235,.06) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 50%,#000 40%,transparent 100%);
}
.glow{
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,.12) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}

.brand{
  display:flex;align-items:center;gap:14px;
  margin-bottom:56px;
  animation:fadeUp .6s ease both;
}
.brand-logo{
  width:48px;height:48px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:14px;
  display:grid;place-items:center;
  font-size:22px;
  box-shadow:0 0 32px rgba(37,99,235,.35);
}
.brand-text h1{
  font-family:'Syne',sans-serif;
  font-size:28px;font-weight:800;
  letter-spacing:-.5px;
  background:linear-gradient(90deg,#e8eaf0,#93c5fd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.brand-text p{
  font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;
}

.subtitle{
  font-size:14px;color:var(--muted);
  margin-bottom:48px;
  animation:fadeUp .6s .1s ease both;
  letter-spacing:.02em;
}

.cards{
  display:flex;gap:24px;
  animation:fadeUp .6s .2s ease both;
}

.card{
  position:relative;
  width:300px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px 28px;
  cursor:pointer;
  transition:all .3s ease;
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  border-radius:20px;
  background:linear-gradient(135deg,rgba(37,99,235,.08),transparent);
  opacity:0;transition:opacity .3s;
}
.card:hover{
  border-color:rgba(37,99,235,.5);
  transform:translateY(-4px);
  box-shadow:0 16px 48px rgba(37,99,235,.15);
}
.card:hover::before{opacity:1;}

.card-icon{
  width:52px;height:52px;
  border-radius:14px;
  display:grid;place-items:center;
  font-size:24px;
  margin-bottom:20px;
  position:relative;z-index:1;
}
.card:nth-child(1) .card-icon{background:rgba(37,99,235,.15);box-shadow:0 0 20px rgba(37,99,235,.2);}
.card:nth-child(2) .card-icon{background:rgba(14,165,233,.15);box-shadow:0 0 20px rgba(14,165,233,.2);}

.card h2{
  font-family:'Syne',sans-serif;
  font-size:17px;font-weight:700;
  margin-bottom:8px;
  position:relative;z-index:1;
}
.card p{
  font-size:13px;color:var(--muted);
  line-height:1.6;
  position:relative;z-index:1;
}
.card-arrow{
  position:absolute;
  bottom:24px;right:24px;
  width:32px;height:32px;
  border-radius:50%;
  background:rgba(37,99,235,.15);
  border:1px solid rgba(37,99,235,.3);
  display:grid;place-items:center;
  font-size:14px;
  transition:all .3s;
  color:var(--accent2);
}
.card:hover .card-arrow{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  transform:translateX(3px);
}

/* ── FRAME WRAPPER ── */
#frame-wrapper{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .4s ease;
}
#frame-wrapper.show{opacity:1;pointer-events:all;}

.top-bar{
  height:52px;min-height:52px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 20px;
  gap:16px;
  z-index:50;
}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 16px;
  background:rgba(37,99,235,.12);
  border:1px solid rgba(37,99,235,.25);
  border-radius:8px;
  color:var(--accent2);
  font-size:13px;font-weight:500;
  cursor:pointer;
  transition:all .2s;
  font-family:'DM Sans',sans-serif;
}
.back-btn:hover{background:rgba(37,99,235,.22);border-color:var(--accent);}
.bar-title{
  font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--text);
  letter-spacing:-.2px;
}
.bar-badge{
  padding:3px 10px;
  border-radius:20px;
  font-size:11px;font-weight:600;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.badge-blue{background:rgba(37,99,235,.15);color:#93c5fd;border:1px solid rgba(37,99,235,.2);}
.badge-sky{background:rgba(14,165,233,.15);color:#7dd3fc;border:1px solid rgba(14,165,233,.2);}

#frame-container{flex:1;position:relative;}
#frame-container iframe{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="grid-bg"></div>
  <div class="glow"></div>
  
  <div class="brand">
    <div class="brand-logo">🏗️</div>
    <div class="brand-text">
      <h1>Strata Finance</h1>
      <p>SPV Command Centre</p>
    </div>
  </div>

  <p class="subtitle">Select a dashboard to open</p>

  <div class="cards">
    <div class="card" onclick="openDash('spv')">
      <div class="card-icon">📊</div>
      <h2>Receivable Management</h2>
      <p>Investor receivables tracking, loan repayment status and portfolio-level analytics.</p>
      <div class="card-arrow">→</div>
    </div>
    <div class="card" onclick="openDash('bank')">
      <div class="card-icon">🏦</div>
      <h2>Treasury Management</h2>
      <p>Live bank balance monitoring across SPV accounts with import and history view.</p>
      <div class="card-arrow">→</div>
    </div>
  </div>
</div>

<!-- FRAME WRAPPER -->
<div id="frame-wrapper">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <span class="bar-title" id="bar-title"></span>
    <span class="bar-badge" id="bar-badge"></span>
  </div>
  <div id="frame-container">
    <iframe id="main-frame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
  </div>
</div>

function openDash(which) {
  const landing = document.getElementById('landing');
  const wrapper = document.getElementById('frame-wrapper');
  const frame   = document.getElementById('main-frame');
  const title   = document.getElementById('bar-title');
  const badge   = document.getElementById('bar-badge');

  if(which === 'spv') {
    frame.src = D1;
    title.textContent = 'Receivable Management';
    badge.textContent = 'Receivables';
    badge.className = 'bar-badge badge-blue';
  } else {
    frame.src = D2;
    title.textContent = 'Treasury Management';
    badge.textContent = 'Bank';
    badge.className = 'bar-badge badge-sky';
  }

  landing.classList.add('hide');
  wrapper.classList.add('show');
}

function goBack() {
  const landing = document.getElementById('landing');
  const wrapper = document.getElementById('frame-wrapper');
  const frame   = document.getElementById('main-frame');

  wrapper.classList.remove('show');
  landing.classList.remove('hide');
  setTimeout(() => { frame.src = 'about:blank'; }, 400);
}
</script>
